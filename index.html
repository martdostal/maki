<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maki - Sports Trading &amp; Settlement Platform</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #0a0c10;
      --bg-secondary: #12141a;
      --bg-card: #181b23;
      --bg-card-hover: #1e2130;
      --bg-surface: #1e212b;
      --bg-input: #111318;
      --bg-elevated: #222533;
      --border-primary: #262937;
      --border-subtle: #1e2130;
      --border-focus: #4a5068;
      --text-primary: #e8eaef;
      --text-secondary: #9aa0b0;
      --text-muted: #5a6070;
      --green: #22c55e;
      --green-bg: rgba(34, 197, 94, 0.10);
      --green-border: rgba(34, 197, 94, 0.22);
      --red: #ef4444;
      --red-bg: rgba(239, 68, 68, 0.10);
      --red-border: rgba(239, 68, 68, 0.22);
      --orange: #f59e0b;
      --orange-bg: rgba(245, 158, 11, 0.10);
      --orange-border: rgba(245, 158, 11, 0.22);
      --blue: #3b82f6;
      --blue-bg: rgba(59, 130, 246, 0.10);
      --blue-border: rgba(59, 130, 246, 0.22);
      --purple: #8b5cf6;
      --purple-bg: rgba(139, 92, 246, 0.10);
      --purple-border: rgba(139, 92, 246, 0.22);
      --cyan: #06b6d4;
      --settled: #10b981;
      --settled-bg: rgba(16, 185, 129, 0.10);
      --settled-border: rgba(16, 185, 129, 0.22);
      --void: #6b7280;
      --void-bg: rgba(107, 114, 128, 0.10);
      --void-border: rgba(107, 114, 128, 0.22);
      --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --radius-xs: 3px;
      --radius-sm: 5px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 13px;
      line-height: 1.4;
      overflow: hidden;
      height: 100vh;
    }

    #root { height: 100vh; display: flex; flex-direction: column; }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2d38; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #3a3d48; }

    @keyframes flashGreen {
      0% { background-color: rgba(34, 197, 94, 0.25); }
      100% { background-color: transparent; }
    }
    @keyframes flashRed {
      0% { background-color: rgba(239, 68, 68, 0.25); }
      100% { background-color: transparent; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes countdownPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.4); }
      50% { box-shadow: 0 0 0 6px rgba(245, 158, 11, 0); }
    }
    @keyframes countdownPulseRed {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
      50% { box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); }
    }
    @keyframes progressShrink {
      from { width: 100%; }
      to { width: 0%; }
    }
    .flash-green { animation: flashGreen 0.6s ease-out; }
    .flash-red { animation: flashRed 0.6s ease-out; }

    /* ===== TOP BAR ===== */
    .top-bar {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-primary);
      padding: 0 20px;
      display: flex;
      align-items: center;
      height: 44px;
      flex-shrink: 0;
      gap: 14px;
    }
    .top-bar__logo {
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 1px;
      color: var(--blue);
    }
    .top-bar__sep { width: 1px; height: 22px; background: var(--border-primary); }
    .top-bar__match-id {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      background: var(--bg-input);
      padding: 2px 8px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-subtle);
    }
    .top-bar__sport { font-size: 12px; color: var(--text-secondary); }
    .top-bar__date { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }
    .top-bar__actions { margin-left: auto; display: flex; gap: 10px; align-items: center; }
    .top-bar__kbd { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--text-muted); }
    .kbd {
      font-family: var(--font-mono); font-size: 10px; padding: 1px 5px;
      background: var(--bg-input); border: 1px solid var(--border-primary); border-radius: 3px; color: var(--text-muted);
    }

    /* Mode Toggle in top bar */
    .global-mode-toggle {
      display: flex; align-items: center; gap: 4px; background: var(--bg-input);
      border: 1px solid var(--border-primary); border-radius: var(--radius-sm); padding: 2px;
    }
    .global-mode-btn {
      font-family: var(--font-sans); font-size: 10px; font-weight: 600; padding: 3px 10px;
      border: none; background: transparent; color: var(--text-muted); cursor: pointer;
      border-radius: var(--radius-xs); transition: all 0.12s; display: flex; align-items: center; gap: 4px;
    }
    .global-mode-btn:hover { color: var(--text-secondary); }
    .global-mode-btn--active { background: var(--blue-bg); color: var(--blue); }

    /* ===== MATCH HERO ===== */
    .match-hero {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-primary);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 24px;
      flex-shrink: 0;
    }
    .match-hero__teams { display: flex; align-items: center; gap: 14px; }
    .match-hero__team { text-align: center; min-width: 110px; }
    .match-hero__team-name { font-size: 15px; font-weight: 700; color: var(--text-primary); }
    .match-hero__team-stats { font-size: 10px; color: var(--text-muted); margin-top: 2px; display: flex; justify-content: center; gap: 8px; }
    .match-hero__team-stats span { display: flex; align-items: center; gap: 2px; }
    .match-hero__score-block { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .match-hero__score {
      font-family: var(--font-mono); font-size: 26px; font-weight: 800; color: var(--text-primary);
      letter-spacing: 4px; background: var(--bg-surface); padding: 3px 14px;
      border-radius: var(--radius-md); border: 1px solid var(--border-primary);
    }
    .match-hero__live-badge {
      display: flex; align-items: center; gap: 5px; font-size: 11px;
      font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--green);
    }
    .match-hero__live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 1.5s infinite; }
    .match-hero__divider { width: 1px; height: 44px; background: var(--border-primary); }
    .match-hero__info { display: flex; gap: 20px; }
    .match-hero__stat { display: flex; flex-direction: column; gap: 1px; }
    .match-hero__stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px; }
    .match-hero__stat-value { font-family: var(--font-mono); font-size: 14px; font-weight: 700; }
    .match-hero__global-actions { margin-left: auto; display: flex; gap: 6px; }
    .btn {
      font-family: var(--font-sans); font-size: 11px; font-weight: 600; padding: 6px 14px;
      border-radius: var(--radius-sm); cursor: pointer; transition: all 0.12s;
      border: 1px solid transparent; display: flex; align-items: center; gap: 5px;
    }
    .btn--open { background: var(--green); color: #000; border-color: var(--green); }
    .btn--open:hover { filter: brightness(1.1); }
    .btn--suspend { background: var(--orange); color: #000; border-color: var(--orange); }
    .btn--suspend:hover { filter: brightness(1.1); }
    .btn--danger { background: var(--red-bg); color: var(--red); border-color: var(--red-border); }
    .btn--danger:hover { background: rgba(239,68,68,0.18); }
    .btn--ghost { background: transparent; color: var(--text-secondary); border: 1px solid var(--border-primary); }
    .btn--ghost:hover { background: var(--bg-surface); border-color: var(--border-focus); }
    .btn--sm { font-size: 11px; padding: 4px 10px; }
    .btn--xs { font-size: 10px; padding: 3px 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }

    /* ===== MAIN LAYOUT ===== */
    .main-layout { flex: 1; display: flex; overflow: hidden; }

    /* ===== LEFT PANEL ===== */
    .left-panel {
      width: 256px; flex-shrink: 0; background: var(--bg-secondary);
      border-right: 1px solid var(--border-primary); display: flex;
      flex-direction: column; overflow-y: auto;
    }
    .left-panel::-webkit-scrollbar { width: 4px; }
    .panel-section { padding: 14px; border-bottom: 1px solid var(--border-primary); }
    .panel-section__title {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: var(--text-muted); margin-bottom: 10px;
    }

    /* Timeline */
    .timeline { display: flex; flex-direction: column; gap: 2px; }
    .timeline-item {
      display: flex; align-items: center; gap: 8px; padding: 6px 8px;
      border-radius: var(--radius-sm); cursor: pointer; transition: background 0.12s;
    }
    .timeline-item:hover { background: var(--bg-surface); }
    .timeline-item--active { background: var(--bg-surface); }
    .timeline-item__indicator {
      width: 26px; height: 26px; border-radius: 50%; display: flex;
      align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0;
    }
    .timeline-item__indicator--completed { background: var(--green-bg); color: var(--green); border: 1.5px solid var(--green-border); }
    .timeline-item__indicator--active { background: var(--blue-bg); color: var(--blue); border: 1.5px solid var(--blue-border); }
    .timeline-item__indicator--pending { background: var(--bg-input); color: var(--text-muted); border: 1.5px solid var(--border-primary); }
    .timeline-item__content { flex: 1; min-width: 0; }
    .timeline-item__name { font-size: 12px; font-weight: 600; color: var(--text-primary); }
    .timeline-item__status { font-size: 10px; color: var(--text-muted); }
    .timeline-item__status--live { color: var(--green); font-weight: 600; }
    .timeline-item__score { font-family: var(--font-mono); font-size: 11px; font-weight: 700; color: var(--text-secondary); }
    .timeline-connector { width: 1px; height: 6px; background: var(--border-primary); margin-left: 20px; }

    /* Flow Actions */
    .flow-actions { display: flex; flex-direction: column; gap: 5px; }
    .flow-btn {
      font-family: var(--font-sans); width: 100%; padding: 7px 10px; font-size: 11px;
      font-weight: 600; border-radius: var(--radius-sm); cursor: pointer;
      transition: all 0.12s; text-align: left; display: flex; align-items: center; gap: 6px;
    }
    .flow-btn--primary { background: var(--blue); color: #fff; border: none; }
    .flow-btn--primary:hover { filter: brightness(1.1); }
    .flow-btn--secondary { background: var(--bg-surface); color: var(--text-secondary); border: 1px solid var(--border-primary); }
    .flow-btn--secondary:hover { background: var(--bg-elevated); }
    .flow-btn--danger { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
    .flow-btn--danger:hover { background: rgba(239,68,68,0.18); }
    .flow-btn__icon { font-size: 12px; width: 16px; text-align: center; }

    /* Quick Stats */
    .quick-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .quick-stat {
      background: var(--bg-surface); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm); padding: 6px 8px;
    }
    .quick-stat__label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.3px; }
    .quick-stat__value { font-family: var(--font-mono); font-size: 13px; font-weight: 700; margin-top: 1px; }

    /* ===== CENTER PANEL ===== */
    .center-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

    /* Market Tabs */
    .market-tabs {
      display: flex; align-items: center; gap: 2px; padding: 6px 14px;
      background: var(--bg-secondary); border-bottom: 1px solid var(--border-primary);
      flex-shrink: 0; overflow-x: auto;
    }
    .market-tab {
      font-family: var(--font-sans); font-size: 11px; font-weight: 500; padding: 5px 12px;
      border: none; background: transparent; color: var(--text-muted); cursor: pointer;
      border-radius: var(--radius-sm); transition: all 0.12s; white-space: nowrap;
      display: flex; align-items: center; gap: 5px;
    }
    .market-tab:hover { color: var(--text-secondary); background: var(--bg-surface); }
    .market-tab--active { background: var(--bg-surface); color: var(--text-primary); font-weight: 600; }
    .market-tab__count {
      font-size: 9px; font-family: var(--font-mono); background: var(--bg-input);
      padding: 1px 5px; border-radius: 7px; color: var(--text-muted);
    }
    .market-tab--active .market-tab__count { background: var(--blue-bg); color: var(--blue); }
    .market-tabs__spacer { flex: 1; }
    .market-tabs__summary { display: flex; gap: 10px; font-size: 10px; color: var(--text-muted); align-items: center; }
    .market-tabs__summary-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 3px; }

    /* Search */
    .market-search {
      display: flex; align-items: center; gap: 5px; padding: 4px 8px;
      background: var(--bg-input); border: 1px solid var(--border-primary);
      border-radius: var(--radius-sm); margin-right: 8px;
    }
    .market-search__icon { color: var(--text-muted); font-size: 11px; }
    .market-search__input {
      background: none; border: none; color: var(--text-primary);
      font-family: var(--font-sans); font-size: 11px; outline: none; width: 120px;
    }
    .market-search__input::placeholder { color: var(--text-muted); }

    /* Market Grid - 3 columns */
    .market-grid-container { flex: 1; overflow-y: auto; padding: 10px 14px; }
    .market-grid-container::-webkit-scrollbar { width: 5px; }
    .market-grid { display: flex; gap: 10px; align-items: flex-start; }
    .market-column { flex: 1; display: flex; flex-direction: column; gap: 8px; min-width: 0; }

    /* ===== MARKET CARD ===== */
    .market-card {
      background: var(--bg-card); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md); overflow: hidden; transition: border-color 0.12s;
    }
    .market-card:hover { border-color: var(--border-primary); }
    .market-card--open { border-left: 3px solid var(--green); }
    .market-card--suspended { border-left: 3px solid var(--orange); }
    .market-card--closed { border-left: 3px solid var(--red); opacity: 0.7; }
    .market-card--settled { border-left: 3px solid var(--settled); }
    .market-card--void { border-left: 3px solid var(--void); }
    .market-card--settling { animation: countdownPulse 1s infinite; border-left-color: var(--orange); }
    .market-card--cancelling { animation: countdownPulseRed 1s infinite; border-left-color: var(--red); }

    .market-card__header {
      display: flex; align-items: center; gap: 6px; padding: 7px 10px;
      cursor: pointer; user-select: none;
    }
    .market-card__star {
      background: none; border: none; cursor: pointer; font-size: 12px;
      color: var(--text-muted); padding: 0; line-height: 1; transition: all 0.12s;
    }
    .market-card__star:hover { color: var(--orange); transform: scale(1.15); }
    .market-card__star--active { color: var(--orange); }
    .market-card__name {
      font-size: 12px; font-weight: 600; flex: 1; min-width: 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .market-card__specifier {
      font-family: var(--font-mono); font-size: 10px; color: var(--text-muted);
      background: var(--bg-input); padding: 1px 5px; border-radius: var(--radius-xs); margin-left: 3px;
    }
    .market-card__badge {
      font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px;
      padding: 2px 6px; border-radius: 8px;
    }
    .market-card__badge--open { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
    .market-card__badge--suspended { background: var(--orange-bg); color: var(--orange); border: 1px solid var(--orange-border); }
    .market-card__badge--closed { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
    .market-card__badge--settled { background: var(--settled-bg); color: var(--settled); border: 1px solid var(--settled-border); }
    .market-card__badge--void { background: var(--void-bg); color: var(--void); border: 1px solid var(--void-border); }
    .market-card__badge--settling { background: var(--orange-bg); color: var(--orange); border: 1px solid var(--orange-border); }
    .market-card__badge--cancelling { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }

    .market-card__mode-toggle {
      display: flex; gap: 2px; margin-left: 4px;
    }
    .market-card__mode-btn {
      background: none; border: 1px solid var(--border-subtle); color: var(--text-muted);
      cursor: pointer; font-size: 11px; padding: 2px 5px; border-radius: var(--radius-xs);
      transition: all 0.12s; line-height: 1;
    }
    .market-card__mode-btn:hover { color: var(--text-secondary); border-color: var(--border-primary); }
    .market-card__mode-btn--active { background: var(--blue-bg); color: var(--blue); border-color: var(--blue-border); }

    .market-card__chevron {
      color: var(--text-muted); font-size: 10px; transition: transform 0.15s;
    }
    .market-card__chevron--collapsed { transform: rotate(-90deg); }

    .market-card__body { padding: 0 10px 8px; }
    .market-card__body--hidden { display: none; }

    /* ===== MONITOR MODE SELECTIONS ===== */
    .sel-grid { display: grid; gap: 4px; }
    .sel-grid--2 { grid-template-columns: 1fr 1fr; }
    .sel-grid--3 { grid-template-columns: 1fr 1fr 1fr; }
    .sel-grid--list { grid-template-columns: 1fr; }
    .sel-grid--many { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }

    .sel {
      display: flex; align-items: center; justify-content: space-between;
      padding: 5px 8px; background: var(--bg-surface); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm); cursor: pointer; transition: all 0.12s;
      gap: 6px; min-width: 0; position: relative;
    }
    .sel:hover { background: var(--bg-elevated); border-color: var(--border-primary); }
    .sel--suspended { background: var(--orange-bg); border-color: var(--orange-border); }
    .sel--suspended .sel__name, .sel--suspended .sel__odds, .sel--suspended .sel__liability { opacity: 0.35; }
    .sel--winner { background: var(--green-bg); border-color: var(--green-border); }
    .sel--winner .sel__name { color: var(--green); font-weight: 700; }
    .sel__suspended-tag {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: 7px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px;
      color: var(--orange); background: rgba(245,158,11,0.2);
      padding: 1px 6px; border-radius: 6px; pointer-events: none; z-index: 2;
    }
    .sel__winner-tag {
      font-size: 7px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px;
      color: var(--green); background: var(--green-bg); padding: 1px 5px; border-radius: 5px;
    }
    .sel__name {
      font-size: 11px; color: var(--text-secondary); white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0;
    }
    .sel__right { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
    .sel__arrow { font-size: 8px; width: 10px; text-align: center; }
    .sel__arrow--up { color: var(--green); }
    .sel__arrow--down { color: var(--red); }
    .sel__odds {
      font-family: var(--font-mono); font-size: 12px; font-weight: 700;
      color: var(--text-primary); min-width: 34px; text-align: right;
    }
    .sel__liability {
      font-family: var(--font-mono); font-size: 9px; color: var(--text-muted);
      min-width: 36px; text-align: right;
    }

    /* ===== SETTLE MODE SELECTIONS ===== */
    .settle-sel {
      display: flex; align-items: center; padding: 7px 10px;
      background: var(--bg-surface); border: 2px solid var(--border-subtle);
      border-radius: var(--radius-sm); cursor: pointer; transition: all 0.12s; gap: 8px;
    }
    .settle-sel:hover { border-color: var(--border-focus); background: var(--bg-elevated); }
    .settle-sel--selected { border-color: var(--green); background: var(--green-bg); }
    .settle-sel--winner { border-color: var(--settled); background: var(--settled-bg); }
    .settle-sel__radio {
      width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--border-primary);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .settle-sel--selected .settle-sel__radio { border-color: var(--green); }
    .settle-sel--winner .settle-sel__radio { border-color: var(--settled); }
    .settle-sel__radio-dot { width: 7px; height: 7px; border-radius: 50%; }
    .settle-sel--selected .settle-sel__radio-dot { background: var(--green); }

    // Helper: get all selections from a market (flat or line-based)
    function getAllSelections(market) {
      if (market.lines) {
        return market.lines.flatMap(l => l.selections);
      }
      return market.selections || [];
    }

    // Helper: compute overall status for a line-based market
    function computeLineMarketStatus(market) {
      if (!market.lines) return market.status;
      const lines = market.lines;
      if (lines.every(l => l.status === 'settled')) return 'settled';
      if (lines.every(l => l.status === 'closed')) return 'closed';
      if (lines.every(l => l.status === 'suspended' || l.status === 'settled' || l.status === 'closed')) return 'suspended';
      if (lines.some(l => l.status === 'open')) return 'open';
      return market.status;
    }

    function generateInitialHistory(markets) {
      const h = {};
      const now = new Date();
      markets.forEach(m => {
        const entries = [{ time: new Date(now - 3600000), from: null, to: 'open', source: 'System', note: 'Market created' }];
        if (m.status === 'suspended') entries.push({ time: new Date(now - 600000), from: 'open', to: 'suspended', source: 'Provider', note: 'Auto-suspended' });
        if (m.status === 'settled') entries.push(
          { time: new Date(now - 300000), from: 'open', to: 'suspended', source: 'System', note: 'Pre-settlement' },
          { time: new Date(now - 240000), from: 'suspended', to: 'settled', source: 'Trader', note: 'Manual settlement' }
        );
        if (m.status === 'closed') entries.push({ time: new Date(now - 180000), from: 'open', to: 'closed', source: 'Trader', note: 'Market closed' });
        h[m.id] = entries;
      });
      return h;
    }

    function generateInitialOddsHistory(markets) {
      const h = {};
      const now = new Date();
      markets.forEach(m => {
        getAllSelections(m).forEach(s => {
          const entries = [];
          for (let i = 4; i >= 0; i--) {
            const drift = (Math.random() - 0.5) * 0.3;
            entries.push({ time: new Date(now - i * 720000 - Math.random() * 300000), odds: i === 0 ? s.odds : Math.max(1.01, Math.round((s.odds + drift) * 100) / 100) });
          }
          h[s.id] = entries;
        });
      });
      return h;
    }

              </button>
              <button className="flow-btn flow-btn--secondary" onClick={() => onPartAction('cancel-match')}>
                <span className="flow-btn__icon">{'\u26A0'}</span> Cancel Match
              </button>
            </div>
          </div>
          <div className="panel-section">
            <div className="panel-section__title">Quick Stats</div>
            <div className="quick-stats">
              <div className="quick-stat">
                <div className="quick-stat__label">Open</div>
                <div className="quick-stat__value" style={{color:'var(--green)'}}>{openCount}</div>
              </div>
              <div className="quick-stat">
                <div className="quick-stat__label">Suspended</div>
                <div className="quick-stat__value" style={{color:'var(--orange)'}}>{suspendedCount}</div>
              </div>
              <div className="quick-stat">
                <div className="quick-stat__label">Settled</div>
                <div className="quick-stat__value" style={{color:'var(--settled)'}}>{settledCount}</div>
              </div>
              <div className="quick-stat">
                <div className="quick-stat__label">Closed</div>
                <div className="quick-stat__value" style={{color:'var(--red)'}}>{closedCount}</div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // Monitor Mode Selection
    function MonitorSelection({ s, marketSettled, onToggle }) {
      const [flashClass, setFlashClass] = useState('');
      const prevRef = useRef(s.odds);
      useEffect(() => {
        if (s.odds !== prevRef.current) {
          setFlashClass(s.odds > prevRef.current ? 'flash-green' : 'flash-red');
          prevRef.current = s.odds;
          const t = setTimeout(() => setFlashClass(''), 600);
          return () => clearTimeout(t);
        }
      }, [s.odds]);
      const isSuspended = s.status === 'suspended';
      const isWinner = marketSettled === s.id;
      return (
        <div className={`sel ${isSuspended ? 'sel--suspended' : ''} ${isWinner ? 'sel--winner' : ''} ${flashClass}`}
          onClick={() => onToggle(s.id)} title={isSuspended ? 'Click to activate' : 'Click to suspend'}>
          {isSuspended && <span className="sel__suspended-tag">SUSP</span>}
          <span className="sel__name">{s.name}</span>
          {isWinner && <span className="sel__winner-tag">WIN</span>}
          <span className="sel__right">
            <span className="sel__liability">{formatCurrency(s.liability)}</span>
            {s.direction === 'up' && <span className="sel__arrow sel__arrow--up">{'\u25B2'}</span>}
            {s.direction === 'down' && <span className="sel__arrow sel__arrow--down">{'\u25BC'}</span>}
            {!s.direction && <span className="sel__arrow"></span>}
            <span className="sel__odds">{formatOdds(s.odds)}</span>
          </span>
        </div>
      );
    }

    // Settle Mode Selection
    function SettleSelection({ s, selected, isWinner, onSelect }) {
      return (
        <div className={`settle-sel ${selected ? 'settle-sel--selected' : ''} ${isWinner ? 'settle-sel--winner' : ''}`}
          onClick={onSelect}>
          <div className="settle-sel__radio">
            {(selected || isWinner) && <div className="settle-sel__radio-dot"></div>}
          </div>
          <span className="settle-sel__name">{s.name}</span>
        </div>
      );
    }

    // Line Monitor Row
    function LineMonitorRow({ line, onToggleSelection, marketId }) {
      const specClass = line.status === 'settled' ? 'line-specifier--settled' : line.status === 'closed' ? 'line-specifier--void' : '';
      const sels = line.selections;
      return (
        <div className={`line-row ${line.status === 'settled' || line.status === 'closed' ? 'line-row--settled' : ''}`}>
          {sels.length === 2 ? (
            <>
              <div className="line-sels">
                <MonitorSelection s={sels[0]} marketSettled={line.settled}
                  onToggle={id => onToggleSelection(marketId, id, line.id)} />
              </div>
              <span className={`line-specifier ${specClass}`}>{line.specifier}</span>
              <div className="line-sels">
                <MonitorSelection s={sels[1]} marketSettled={line.settled}
                  onToggle={id => onToggleSelection(marketId, id, line.id)} />
              </div>
            </>
          ) : (
            <>
              <span className={`line-specifier ${specClass}`}>{line.specifier}</span>
              <div className="line-sels">
                {sels.map(s => (
                  <MonitorSelection key={s.id} s={s} marketSettled={line.settled}
                    onToggle={id => onToggleSelection(marketId, id, line.id)} />
                ))}
              </div>
            </>
          )}
        </div>
      );
    }

    // Line Settle Row
    function LineSettleRow({ line, marketId, lineSettlingInfo, lineCancellingInfo,
      onStartLineSettle, onStopLineSettle, onStartLineCancel, onStopLineCancel, onRollbackLine }) {
      const [settleSelection, setSettleSelection] = useState(null);
      const isSettling = !!lineSettlingInfo;
      const isCancelling = !!lineCancellingInfo;

      const prevStatus = useRef(line.status);
      useEffect(() => {
        if (prevStatus.current !== line.status) {
          setSettleSelection(null);
          prevStatus.current = line.status;
        }
      }, [line.status]);

      const handleSettleClick = (selId) => {
        if (line.status === 'settled' || line.status === 'closed') return;
        if (isSettling) return;
        setSettleSelection(selId);
      };

      const confirmSettle = () => {
        if (settleSelection) {
          onStartLineSettle(marketId, line.id, settleSelection);
          setSettleSelection(null);
        }
      };

      const specClass = line.status === 'settled' ? 'line-specifier--settled' : line.status === 'closed' ? 'line-specifier--void' : '';
      const rowClass = isSettling ? 'line-row--settling' : isCancelling ? 'line-row--cancelling' : (line.status === 'settled' || line.status === 'closed') ? 'line-row--settled' : '';

      const sels = line.selections;
      const renderSel = (s) => {
        const selected = settleSelection === s.id;
        const isWinner = line.settled === s.id;
        return (
          <div key={s.id}
            className={`line-settle-sel ${selected ? 'line-settle-sel--selected' : ''} ${isWinner ? 'line-settle-sel--winner' : ''}`}
            onClick={() => handleSettleClick(s.id)}>
            <div className="line-settle-sel__radio">
              {(selected || isWinner) && <div className="line-settle-sel__radio-dot"></div>}
            </div>
            <span className="line-settle-sel__name">{s.name}</span>
          </div>
        );
      };

      return (
        <div className={`line-row ${rowClass}`}>
          {sels.length === 2 ? (
            <>
              <div className="line-sels">{renderSel(sels[0])}</div>
              <span className={`line-specifier ${specClass}`}>{line.specifier}</span>
              <div className="line-sels">{renderSel(sels[1])}</div>
            </>
          ) : (
            <>
              <span className={`line-specifier ${specClass}`}>{line.specifier}</span>
              <div className="line-sels">{sels.map(renderSel)}</div>
            </>
          )}
          <div className="line-actions">
            {isSettling && (
              <button className="mkt-ctrl mkt-ctrl--stop" onClick={() => onStopLineSettle(marketId, line.id)}>Stop</button>
            )}
            {isCancelling && (
              <button className="mkt-ctrl mkt-ctrl--stop" onClick={() => onStopLineCancel(marketId, line.id)}>Stop</button>
            )}
            {!isSettling && !isCancelling && (
              <>
                {settleSelection && line.status !== 'settled' && (
                  <button className="mkt-ctrl mkt-ctrl--settle" onClick={confirmSettle}>Settle</button>
                )}
                {(line.status === 'settled' || line.status === 'closed') && (
                  <button className="mkt-ctrl mkt-ctrl--rollback" onClick={() => onRollbackLine(marketId, line.id)}>Roll</button>
                )}
                {line.status !== 'settled' && line.status !== 'closed' && (
                  <button className="mkt-ctrl mkt-ctrl--close" onClick={() => onStartLineCancel(marketId, line.id)}>Void</button>
                )}
              </>
            )}
          </div>
          {isSettling && (
            <div className="line-countdown line-countdown--orange" key={lineSettlingInfo.startTime} style={{position:'absolute',bottom:0,left:0,right:0}}></div>
          )}
          {isCancelling && (
            <div className="line-countdown line-countdown--red" key={lineCancellingInfo.startTime} style={{position:'absolute',bottom:0,left:0,right:0}}></div>
          )}
        </div>
      );
    }

    // Market Card
    function MarketCard({ market, mode, onSetMode, onToggleFavorite, onSetStatus, onToggleSelection,
      onShowHistory, onShowOddsHistory, onStartSettle, onStopSettle, onStartCancel, onStopCancel,
      onRollback, settlingInfo, cancellingInfo,
      lineSettlingMap, lineCancellingMap,
      onStartLineSettle, onStopLineSettle, onStartLineCancel, onStopLineCancel, onRollbackLine }) {
      const [collapsed, setCollapsed] = useState(false);
      const [settleSelection, setSettleSelection] = useState(null);
      const isLineBased = !!market.lines;

      // For flat markets
      const selections = market.selections || [];
      const n = selections.length;
      const gridClass = n === 2 ? 'sel-grid--2' : n === 3 ? 'sel-grid--3' : n > 6 ? 'sel-grid--many' : 'sel-grid--3';

      const isSettling = !!settlingInfo;
      const isCancelling = !!cancellingInfo;

      // Compute effective status for line-based markets
      let effectiveStatus = market.status;
      let badgeText = market.status;
      if (isLineBased) {
        const hasLineSettling = market.lines.some(l => lineSettlingMap && lineSettlingMap[l.id]);
        const hasLineCancelling = market.lines.some(l => lineCancellingMap && lineCancellingMap[l.id]);
        if (hasLineSettling) { badgeText = 'settling...'; effectiveStatus = 'settling'; }
        else if (hasLineCancelling) { badgeText = 'cancelling...'; effectiveStatus = 'cancelling'; }
        else { effectiveStatus = computeLineMarketStatus(market); badgeText = effectiveStatus; }
      } else {
        if (isSettling) { badgeText = 'settling...'; effectiveStatus = 'settling'; }
        else if (isCancelling) { badgeText = 'cancelling...'; effectiveStatus = 'cancelling'; }
      }

      const statusClass = effectiveStatus === 'settling' ? 'market-card--settling' : effectiveStatus === 'cancelling' ? 'market-card--cancelling' : `market-card--${effectiveStatus}`;

      // Reset settleSelection when market status changes
      const prevStatus = useRef(market.status);
      useEffect(() => {
        if (prevStatus.current !== market.status) {
          setSettleSelection(null);
          prevStatus.current = market.status;
        }
      }, [market.status]);

      const handleSettleClick = (selId) => {
        if (market.status === 'settled' || market.status === 'closed') return;
        if (isSettling) return;
        setSettleSelection(selId);
      };

      const confirmSettle = () => {
        if (settleSelection) {
          onStartSettle(market.id, settleSelection);
        }
      };

      return (
        <div className={`market-card ${statusClass}`}>
          <div className="market-card__header" onClick={() => setCollapsed(!collapsed)}>
            <button className={`market-card__star ${market.favorite ? 'market-card__star--active' : ''}`}
              onClick={e => { e.stopPropagation(); onToggleFavorite(market.id); }}>
              {market.favorite ? '\u2605' : '\u2606'}
            </button>
            <span className="market-card__name">
              {market.name}
              {market.specifier && <span className="market-card__specifier">{market.specifier}</span>}
              {isLineBased && <span className="market-card__specifier">{market.lines.length} lines</span>}
            </span>
            <span className={`market-card__badge market-card__badge--${effectiveStatus === 'settling' ? 'settling' : effectiveStatus === 'cancelling' ? 'cancelling' : effectiveStatus}`}>
              {badgeText}
            </span>
            <div className="market-card__mode-toggle" onClick={e => e.stopPropagation()}>
              <button className={`market-card__mode-btn ${mode === 'monitor' ? 'market-card__mode-btn--active' : ''}`}
                onClick={() => onSetMode(market.id, 'monitor')} title="Monitor">{'\uD83D\uDC41'}</button>
              <button className={`market-card__mode-btn ${mode === 'settle' ? 'market-card__mode-btn--active' : ''}`}
                onClick={() => onSetMode(market.id, 'settle')} title="Settle">{'\u2696'}</button>
            </div>
            <span className={`market-card__chevron ${collapsed ? 'market-card__chevron--collapsed' : ''}`}>{'\u25BE'}</span>
          </div>
          <div className={`market-card__body ${collapsed ? 'market-card__body--hidden' : ''}`}>
            {isLineBased ? (
              /* Line-based market rendering */
              mode === 'monitor' ? (
                <div style={{display:'flex',flexDirection:'column',gap:0}}>
                  {market.lines.map(line => (
                    <LineMonitorRow key={line.id} line={line} onToggleSelection={onToggleSelection} marketId={market.id} />
                  ))}
                </div>
              ) : (
                <div style={{display:'flex',flexDirection:'column',gap:0}}>
                  {market.lines.map(line => (
                    <LineSettleRow key={line.id} line={line} marketId={market.id}
                      lineSettlingInfo={lineSettlingMap && lineSettlingMap[line.id]}
                      lineCancellingInfo={lineCancellingMap && lineCancellingMap[line.id]}
                      onStartLineSettle={onStartLineSettle}
                      onStopLineSettle={onStopLineSettle}
                      onStartLineCancel={onStartLineCancel}
                      onStopLineCancel={onStopLineCancel}
                      onRollbackLine={onRollbackLine} />
                  ))}
                </div>
              )
            ) : (
              /* Flat market rendering */
              mode === 'monitor' ? (
                <div className={`sel-grid ${gridClass}`}>
                  {selections.map(s => (
                    <MonitorSelection key={s.id} s={s} marketSettled={market.settled}
                      onToggle={id => onToggleSelection(market.id, id)} />
                  ))}
                </div>
              ) : (
                <div style={{display:'flex',flexDirection:'column',gap:3}}>
                  {selections.map(s => (
                    <SettleSelection key={s.id} s={s}
                      selected={settleSelection === s.id}
                      isWinner={market.settled === s.id}
                      onSelect={() => handleSettleClick(s.id)} />
                  ))}
                  {settleSelection && !isSettling && market.status !== 'settled' && (
                    <button className="btn btn--sm" style={{background:'var(--settled)',color:'#000',borderColor:'var(--settled)',marginTop:4,alignSelf:'flex-end'}}
                      onClick={confirmSettle}>Confirm Settle</button>
                  )}
                </div>
              )
            )}

            {/* Flat market countdown bars */}
            {!isLineBased && isSettling && (
              <div className="countdown-bar" key={settlingInfo.startTime}></div>
            )}
            {!isLineBased && isCancelling && (
              <div className="countdown-bar countdown-bar--red" key={cancellingInfo.startTime}></div>
            )}

            <div className="mkt-controls">
              {!isLineBased && isSettling && (
                <button className="mkt-ctrl mkt-ctrl--stop" onClick={() => onStopSettle(market.id)}>Stop</button>
              )}
              {!isLineBased && isCancelling && (
                <button className="mkt-ctrl mkt-ctrl--stop" onClick={() => onStopCancel(market.id)}>Stop</button>
              )}
              {!isLineBased && !isSettling && !isCancelling && (
                <>
                  {market.status !== 'open' && market.status !== 'settled' && (
                    <button className="mkt-ctrl mkt-ctrl--open" onClick={() => onSetStatus(market.id, 'open')}>Open</button>
                  )}
                  {market.status === 'open' && (
                    <button className="mkt-ctrl mkt-ctrl--suspend" onClick={() => onSetStatus(market.id, 'suspended')}>Susp</button>
                  )}
                  {market.status !== 'closed' && market.status !== 'settled' && (
                    <button className="mkt-ctrl mkt-ctrl--close" onClick={() => onSetStatus(market.id, 'closed')}>Close</button>
                  )}
                  {(market.status === 'settled' || market.status === 'closed') && (
                    <button className="mkt-ctrl mkt-ctrl--rollback" onClick={() => onRollback(market.id)}>Rollback</button>
                  )}
                  {market.status !== 'settled' && (
                    <button className="mkt-ctrl mkt-ctrl--close" onClick={() => onStartCancel(market.id)}>Cancel</button>
                  )}
                </>
              )}
              {isLineBased && (
                <>
                  {effectiveStatus !== 'open' && effectiveStatus !== 'settled' && effectiveStatus !== 'settling' && effectiveStatus !== 'cancelling' && (
                    <button className="mkt-ctrl mkt-ctrl--open" onClick={() => onSetStatus(market.id, 'open')}>Open All</button>
                  )}
                  {effectiveStatus === 'open' && (
                    <button className="mkt-ctrl mkt-ctrl--suspend" onClick={() => onSetStatus(market.id, 'suspended')}>Susp All</button>
                  )}
                </>
              )}
              <button className="mkt-ctrl mkt-ctrl--history" onClick={() => onShowHistory(market.id)}>Hist</button>
              <button className="mkt-ctrl" style={{color:'var(--purple)',borderColor:'var(--purple-border)'}}
                onClick={() => onShowOddsHistory(market.id)}>Odds</button>
              <div className="mkt-controls__spacer"></div>
              <div className="mkt-controls__stats">
                <span>L: <span>{formatCurrency(market.liability)}</span></span>
                <span>V: <span>{formatCurrency(market.volume)}</span></span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // Status History Modal
    function StatusHistoryModal({ market, history, onClose }) {
      return (
        <div className="overlay" onClick={onClose}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal__header">
              <div className="modal__title">History: {market.name}{market.specifier ? ` (${market.specifier})` : ''}</div>
              <button className="modal__close" onClick={onClose}>{'\u00D7'}</button>
            </div>
            <table className="htable">
              <thead><tr><th>Time</th><th>From</th><th></th><th>To</th><th>Source</th><th>Note</th></tr></thead>
              <tbody>
                {[...(history || [])].reverse().map((e, i) => (
                  <tr key={i}>
                    <td className="htable__time">{formatTime(e.time)}</td>
                    <td>{e.from ? <span className={`htable__badge htable__badge--${e.from}`}>{e.from}</span> : '\u2014'}</td>
                    <td style={{color:'var(--text-muted)',textAlign:'center'}}>{'\u2192'}</td>
                    <td><span className={`htable__badge htable__badge--${e.to}`}>{e.to}</span></td>
                    <td>{e.source}</td>
                    <td style={{color:'var(--text-muted)',fontSize:10}}>{e.note}</td>
                  </tr>
                ))}
              </tbody>
            </table>
            {(!history || history.length === 0) && <div style={{textAlign:'center',padding:20,color:'var(--text-muted)'}}>No history</div>}
          </div>
        </div>
      );
    }

    // Odds History Modal
    function OddsHistoryModal({ market, oddsHistory, onClose }) {
      const allSels = getAllSelections(market);
      const [selId, setSelId] = useState(allSels[0]?.id);
      const entries = oddsHistory[selId] || [];
      return (
        <div className="overlay" onClick={onClose}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal__header">
              <div className="modal__title">Odds: {market.name}{market.specifier ? ` (${market.specifier})` : ''}</div>
              <button className="modal__close" onClick={onClose}>{'\u00D7'}</button>
            </div>
            <div className="odds-tabs">
              {allSels.map(s => (
                <button key={s.id} className={`odds-tab ${selId === s.id ? 'odds-tab--active' : ''}`}
                  onClick={() => setSelId(s.id)}>{s.name}</button>
              ))}
            </div>
            <table className="htable">
              <thead><tr><th>Time</th><th>Odds</th><th>Change</th></tr></thead>
              <tbody>
                {[...entries].reverse().map((e, i, arr) => {
                  const prev = arr[i + 1];
                  const diff = prev ? e.odds - prev.odds : 0;
                  return (
                    <tr key={i}>
                      <td className="htable__time">{formatTime(e.time)}</td>
                      <td style={{fontFamily:'var(--font-mono)',fontWeight:700}}>{formatOdds(e.odds)}</td>
                      <td style={{fontFamily:'var(--font-mono)',fontWeight:600,color: diff > 0 ? 'var(--green)' : diff < 0 ? 'var(--red)' : 'var(--text-muted)'}}>
                        {prev ? `${diff > 0 ? '\u25B2' : diff < 0 ? '\u25BC' : '\u2014'} ${diff !== 0 ? Math.abs(diff).toFixed(2) : ''}` : 'Initial'}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    // Cancel Reason Modal
    function CancelModal({ market, lineId, onConfirm, onConfirmLine, onClose }) {
      const [reason, setReason] = useState('');
      const lineName = lineId && market.lines ? market.lines.find(l => l.id === lineId)?.specifier : null;
      const title = lineName ? `Cancel: ${market.name} (${lineName})` : `Cancel: ${market.name}`;
      return (
        <div className="overlay" onClick={onClose}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal__header">
              <div className="modal__title">{title}</div>
              <button className="modal__close" onClick={onClose}>{'\u00D7'}</button>
            </div>
            <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:8}}>Provide a reason for cancellation:</div>
            <textarea className="cancel-textarea" placeholder="Reason..." value={reason}
              onChange={e => setReason(e.target.value)} autoFocus />
            <div style={{display:'flex',gap:6,justifyContent:'flex-end'}}>
              <button className="btn btn--ghost btn--sm" onClick={onClose}>Back</button>
              <button className="btn btn--danger btn--sm" style={{opacity: reason.trim() ? 1 : 0.4}}
                onClick={() => {
                  if (!reason.trim()) return;
                  if (lineId) {
                    onConfirmLine(market.id, lineId, reason);
                  } else {
                    onConfirm(market.id, reason);
                  }
                }} disabled={!reason.trim()}>
                Start Cancel (10s)
              </button>
            </div>
          </div>
        </div>
      );
    }

    // Group Modal
    function GroupModal({ markets, onGroupAction, onClose }) {
      return (
        <div className="overlay" onClick={onClose}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal__header">
              <div className="modal__title">Market Groups</div>
              <button className="modal__close" onClick={onClose}>{'\u00D7'}</button>
            </div>
            <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:10}}>Suspend or open all markets within a group</div>
            {GROUP_KEYS.map(key => {
              const groupMarkets = markets.filter(m => m.group === key);
              const openCount = groupMarkets.filter(m => m.lines ? computeLineMarketStatus(m) === 'open' : m.status === 'open').length;
              return (
                <div className="group-item" key={key}>
                  <span>
                    <span className="group-item__name">{MARKET_GROUPS[key]?.name || key}</span>
                    <span className="group-item__count">{openCount}/{groupMarkets.length} open</span>
                  </span>
                  <div className="group-item__actions">
                    <button className="btn btn--xs" style={{background:'var(--green-bg)',color:'var(--green)',border:'1px solid var(--green-border)'}}
                      onClick={() => onGroupAction(key, 'open')}>Open</button>
                    <button className="btn btn--xs" style={{background:'var(--orange-bg)',color:'var(--orange)',border:'1px solid var(--orange-border)'}}
                      onClick={() => onGroupAction(key, 'suspended')}>Suspend</button>
                  </div>
                </div>
              );
            })}
            <div style={{textAlign:'center',marginTop:10,fontSize:10,color:'var(--text-muted)'}}>
              Press <span className="kbd">ESC</span> or <span className="kbd">G</span> to close
            </div>
          </div>
        </div>
      );
    }

    // ===== MAIN APP =====
    function App() {
      const [markets, setMarkets] = useState(initialMarkets);
      const [parts, setParts] = useState(initialParts);
      const [activeTab, setActiveTab] = useState('all');
      const [searchQuery, setSearchQuery] = useState('');
      const [toast, setToast] = useState(null);
      const [matchTime, setMatchTime] = useState(62);
      const [statusHistory, setStatusHistory] = useState(() => generateInitialHistory(initialMarkets));
      const [oddsHistory, setOddsHistory] = useState(() => generateInitialOddsHistory(initialMarkets));
      const [modal, setModal] = useState(null);
      const [showGroupPopup, setShowGroupPopup] = useState(false);
      const [globalMode, setGlobalMode] = useState('monitor');
      const [marketModes, setMarketModes] = useState({});
      const [settlingMap, setSettlingMap] = useState({});
      const [cancellingMap, setCancellingMap] = useState({});
      // Line-level state
      const [lineSettlingMap, setLineSettlingMap] = useState({});  // { lineId: { winnerId, startTime } }
      const [lineCancellingMap, setLineCancellingMap] = useState({});  // { lineId: { reason, startTime } }
      const settleTimers = useRef({});
      const cancelTimers = useRef({});
      const lineSettleTimers = useRef({});
      const lineCancelTimers = useRef({});
      const searchRef = useRef(null);

      // Get mode for a market (per-market override or global)
      const getMode = useCallback((marketId) => {
        return marketModes[marketId] || globalMode;
      }, [marketModes, globalMode]);

      const setMarketMode = useCallback((marketId, mode) => {
        setMarketModes(prev => ({ ...prev, [marketId]: mode }));
      }, []);

      const handleSetGlobalMode = useCallback((mode) => {
        setGlobalMode(mode);
        setMarketModes({});
      }, []);

      // Live odds simulation - handles both flat and line-based markets
      useEffect(() => {
        const interval = setInterval(() => {
          const updates = [];
          setMarkets(prev => {
            const next = prev.map(m => {
              if (m.lines) {
                return { ...m, lines: m.lines.map(l => ({ ...l, selections: l.selections.map(s => ({ ...s })) })) };
              }
              return { ...m, selections: (m.selections || []).map(s => ({ ...s })) };
            });
            const count = Math.floor(Math.random() * 3) + 1;
            for (let i = 0; i < count; i++) {
              // Pick a random open market
              const open = next.filter(m => {
                if (m.lines) return m.lines.some(l => l.status === 'open');
                return m.status === 'open';
              });
              if (!open.length) break;
              const m = open[Math.floor(Math.random() * open.length)];
              let activeSels;
              if (m.lines) {
                const openLines = m.lines.filter(l => l.status === 'open');
                if (!openLines.length) continue;
                const line = openLines[Math.floor(Math.random() * openLines.length)];
                activeSels = line.selections.filter(s => s.status === 'active');
              } else {
                activeSels = (m.selections || []).filter(s => s.status === 'active');
              }
              if (!activeSels.length) continue;
              const s = activeSels[Math.floor(Math.random() * activeSels.length)];
              const change = (Math.random() - 0.48) * 0.12;
              const newOdds = Math.max(1.01, Math.round((s.odds + change) * 100) / 100);
              if (newOdds !== s.odds) {
                s.prevOdds = s.odds;
                s.direction = newOdds > s.odds ? 'up' : 'down';
                s.odds = newOdds;
                updates.push({ selId: s.id, odds: newOdds });
              }
              s.liability = Math.max(0, s.liability + Math.floor((Math.random() - 0.3) * 200));
              // Update market liability
              if (m.lines) {
                m.liability = m.lines.reduce((sum, l) => sum + l.selections.reduce((s2, sel) => s2 + sel.liability, 0), 0);
              } else {
                m.liability = (m.selections || []).reduce((sum, sel) => sum + sel.liability, 0);
              }
              m.volume += Math.floor(Math.random() * 300);
            }
            return next;
          });
          if (updates.length) {
            setOddsHistory(prev => {
              const next = { ...prev };
              const now = new Date();
              updates.forEach(({ selId, odds }) => { next[selId] = [...(next[selId] || []), { time: now, odds }]; });
              return next;
            });
          }
        }, 2000 + Math.random() * 2000);
        return () => clearInterval(interval);
      }, []);

      // Clear direction arrows - handles both flat and line-based
      useEffect(() => {
        const interval = setInterval(() => {
          setMarkets(prev => prev.map(m => {
            if (m.lines) {
              return { ...m, lines: m.lines.map(l => ({ ...l, selections: l.selections.map(s => ({ ...s, direction: null })) })) };
            }
            return { ...m, selections: (m.selections || []).map(s => ({ ...s, direction: null })) };
          }));
        }, 4000);
        return () => clearInterval(interval);
      }, []);

      // Match time
      useEffect(() => {
        const interval = setInterval(() => setMatchTime(t => t < 90 ? t + 1 : t), 30000);
        return () => clearInterval(interval);
      }, []);

      // Keyboard
      useEffect(() => {
        const handler = e => {
          if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
          if (e.key === 'g' || e.key === 'G') { e.preventDefault(); setShowGroupPopup(p => !p); }
          if (e.key === 's' || e.key === 'S') {
            e.preventDefault();
            if (searchRef.current) searchRef.current.focus();
          }
          if (e.key === 'Escape') { setShowGroupPopup(false); setModal(null); }
        };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, []);

      // Cleanup all timers on unmount
      useEffect(() => {
        return () => {
          Object.values(settleTimers.current).forEach(clearTimeout);
          Object.values(cancelTimers.current).forEach(clearTimeout);
          Object.values(lineSettleTimers.current).forEach(clearTimeout);
          Object.values(lineCancelTimers.current).forEach(clearTimeout);
        };
      }, []);

      const toggleFavorite = useCallback(id => {
        setMarkets(prev => prev.map(m => m.id === id ? { ...m, favorite: !m.favorite } : m));
      }, []);

      const setMarketStatus = useCallback((id, status) => {
        setMarkets(prev => {
          const m = prev.find(x => x.id === id);
          if (m) {
            setStatusHistory(h => ({ ...h, [id]: [...(h[id] || []), { time: new Date(), from: m.status, to: status, source: 'Trader', note: 'Manual' }] }));
          }
          return prev.map(m => {
            if (m.id !== id) return m;
            const selStatus = status === 'open' ? 'active' : 'suspended';
            if (m.lines) {
              return { ...m, status, lines: m.lines.map(l => {
                if (l.status === 'settled') return l; // don't change settled lines
                return { ...l, status, selections: l.selections.map(s => ({ ...s, status: selStatus })) };
              }) };
            }
            return { ...m, status, settled: status === 'open' ? null : m.settled, selections: (m.selections || []).map(s => ({ ...s, status: selStatus })) };
          });
        });
        setToast({ message: `Market ${status}`, type: status === 'open' ? 'success' : 'warning' });
      }, []);

      const toggleSelection = useCallback((mId, sId, lineId) => {
        setMarkets(prev => prev.map(m => {
          if (m.id !== mId) return m;
          if (m.lines && lineId) {
            return { ...m, lines: m.lines.map(l => {
              if (l.id !== lineId) return l;
              return { ...l, selections: l.selections.map(s => s.id === sId ? { ...s, status: s.status === 'active' ? 'suspended' : 'active' } : s) };
            }) };
          }
          return { ...m, selections: (m.selections || []).map(s => s.id === sId ? { ...s, status: s.status === 'active' ? 'suspended' : 'active' } : s) };
        }));
      }, []);

      // Settlement with 10-second countdown (flat markets)
      const startSettle = useCallback((mId, winnerId) => {
        setSettlingMap(prev => ({ ...prev, [mId]: { winnerId, startTime: Date.now() } }));
        settleTimers.current[mId] = setTimeout(() => {
          setMarkets(prev => {
            setStatusHistory(h => ({ ...h, [mId]: [...(h[mId] || []), { time: new Date(), from: prev.find(m => m.id === mId)?.status, to: 'settled', source: 'Trader', note: `Settled: winner=${winnerId}` }] }));
            return prev.map(m => m.id === mId ? { ...m, status: 'settled', settled: winnerId, selections: (m.selections || []).map(s => ({ ...s, status: 'suspended' })) } : m);
          });
          setSettlingMap(prev => { const n = { ...prev }; delete n[mId]; return n; });
          delete settleTimers.current[mId];
          setToast({ message: 'Market settled', type: 'success' });
        }, 10000);
      }, []);

      const stopSettle = useCallback((mId) => {
        if (settleTimers.current[mId]) {
          clearTimeout(settleTimers.current[mId]);
          delete settleTimers.current[mId];
        }
        setSettlingMap(prev => { const n = { ...prev }; delete n[mId]; return n; });
        setToast({ message: 'Settlement stopped', type: 'info' });
      }, []);

      // Line-level settlement
      const startLineSettle = useCallback((mId, lineId, winnerId) => {
        setLineSettlingMap(prev => ({ ...prev, [lineId]: { winnerId, startTime: Date.now() } }));
        lineSettleTimers.current[lineId] = setTimeout(() => {
          setMarkets(prev => {
            setStatusHistory(h => ({ ...h, [mId]: [...(h[mId] || []), { time: new Date(), from: 'open', to: 'settled', source: 'Trader', note: `Line ${lineId} settled: winner=${winnerId}` }] }));
            return prev.map(m => {
              if (m.id !== mId || !m.lines) return m;
              return { ...m, lines: m.lines.map(l => {
                if (l.id !== lineId) return l;
                return { ...l, status: 'settled', settled: winnerId, selections: l.selections.map(s => ({ ...s, status: 'suspended' })) };
              }) };
            });
          });
          setLineSettlingMap(prev => { const n = { ...prev }; delete n[lineId]; return n; });
          delete lineSettleTimers.current[lineId];
          setToast({ message: 'Line settled', type: 'success' });
        }, 10000);
      }, []);

      const stopLineSettle = useCallback((mId, lineId) => {
        if (lineSettleTimers.current[lineId]) {
          clearTimeout(lineSettleTimers.current[lineId]);
          delete lineSettleTimers.current[lineId];
        }
        setLineSettlingMap(prev => { const n = { ...prev }; delete n[lineId]; return n; });
        setToast({ message: 'Line settlement stopped', type: 'info' });
      }, []);

      // Cancel with reason modal + 10-second countdown (flat)
      const startCancelFlow = useCallback((mId) => {
        setModal({ type: 'cancel', marketId: mId });
      }, []);

      const confirmCancel = useCallback((mId, reason) => {
        setModal(null);
        setCancellingMap(prev => ({ ...prev, [mId]: { reason, startTime: Date.now() } }));
        cancelTimers.current[mId] = setTimeout(() => {
          setMarkets(prev => {
            setStatusHistory(h => ({ ...h, [mId]: [...(h[mId] || []), { time: new Date(), from: prev.find(m => m.id === mId)?.status, to: 'closed', source: 'Trader', note: `Cancelled: ${reason}` }] }));
            return prev.map(m => m.id === mId ? { ...m, status: 'closed', selections: (m.selections || []).map(s => ({ ...s, status: 'suspended' })) } : m);
          });
          setCancellingMap(prev => { const n = { ...prev }; delete n[mId]; return n; });
          delete cancelTimers.current[mId];
          setToast({ message: 'Market cancelled', type: 'error' });
        }, 10000);
      }, []);

      const stopCancel = useCallback((mId) => {
        if (cancelTimers.current[mId]) {
          clearTimeout(cancelTimers.current[mId]);
          delete cancelTimers.current[mId];
        }
        setCancellingMap(prev => { const n = { ...prev }; delete n[mId]; return n; });
        setToast({ message: 'Cancellation stopped', type: 'info' });
      }, []);

      // Line-level cancel flow
      const startLineCancelFlow = useCallback((mId, lineId) => {
        setModal({ type: 'cancel', marketId: mId, lineId });
      }, []);

      const confirmLineCancel = useCallback((mId, lineId, reason) => {
        setModal(null);
        setLineCancellingMap(prev => ({ ...prev, [lineId]: { reason, startTime: Date.now() } }));
        lineCancelTimers.current[lineId] = setTimeout(() => {
          setMarkets(prev => {
            setStatusHistory(h => ({ ...h, [mId]: [...(h[mId] || []), { time: new Date(), from: 'open', to: 'closed', source: 'Trader', note: `Line ${lineId} cancelled: ${reason}` }] }));
            return prev.map(m => {
              if (m.id !== mId || !m.lines) return m;
              return { ...m, lines: m.lines.map(l => {
                if (l.id !== lineId) return l;
                return { ...l, status: 'closed', selections: l.selections.map(s => ({ ...s, status: 'suspended' })) };
              }) };
            });
          });
          setLineCancellingMap(prev => { const n = { ...prev }; delete n[lineId]; return n; });
          delete lineCancelTimers.current[lineId];
          setToast({ message: 'Line cancelled', type: 'error' });
        }, 10000);
      }, []);

      const stopLineCancel = useCallback((mId, lineId) => {
        if (lineCancelTimers.current[lineId]) {
          clearTimeout(lineCancelTimers.current[lineId]);
          delete lineCancelTimers.current[lineId];
        }
        setLineCancellingMap(prev => { const n = { ...prev }; delete n[lineId]; return n; });
        setToast({ message: 'Line cancellation stopped', type: 'info' });
      }, []);

      // Rollback (flat)
      const rollback = useCallback(mId => {
        setMarkets(prev => {
          setStatusHistory(h => ({ ...h, [mId]: [...(h[mId] || []), { time: new Date(), from: prev.find(m => m.id === mId)?.status, to: 'open', source: 'Trader', note: 'Rolled back' }] }));
          return prev.map(m => m.id === mId ? { ...m, status: 'open', settled: null, selections: (m.selections || []).map(s => ({ ...s, status: 'active' })) } : m);
        });
        setToast({ message: 'Rolled back to open', type: 'info' });
      }, []);

      // Rollback line
      const rollbackLine = useCallback((mId, lineId) => {
        setMarkets(prev => {
          setStatusHistory(h => ({ ...h, [mId]: [...(h[mId] || []), { time: new Date(), from: 'settled', to: 'open', source: 'Trader', note: `Line ${lineId} rolled back` }] }));
          return prev.map(m => {
            if (m.id !== mId || !m.lines) return m;
            return { ...m, lines: m.lines.map(l => {
              if (l.id !== lineId) return l;
              return { ...l, status: 'open', settled: null, selections: l.selections.map(s => ({ ...s, status: 'active' })) };
            }) };
          });
        });
        setToast({ message: 'Line rolled back to open', type: 'info' });
      }, []);

      const handleGroupAction = useCallback((groupKey, status) => {
        setMarkets(prev => {
          const now = new Date();
          setStatusHistory(h => {
            const next = { ...h };
            prev.filter(m => m.group === groupKey).forEach(m => {
              if (m.lines) {
                if (!m.lines.every(l => l.status === 'settled')) {
                  next[m.id] = [...(next[m.id] || []), { time: now, from: computeLineMarketStatus(m), to: status, source: 'Trader', note: 'Group action' }];
                }
              } else if (m.status !== 'settled') {
                next[m.id] = [...(next[m.id] || []), { time: now, from: m.status, to: status, source: 'Trader', note: 'Group action' }];
              }
            });
            return next;
          });
          return prev.map(m => {
            if (m.group !== groupKey) return m;
            if (m.lines) {
              return { ...m, status, lines: m.lines.map(l => {
                if (l.status === 'settled') return l;
                return { ...l, status, selections: l.selections.map(s => ({ ...s, status: status === 'open' ? 'active' : 'suspended' })) };
              }) };
            }
            if (m.status === 'settled') return m;
            return { ...m, status, selections: (m.selections || []).map(s => ({ ...s, status: status === 'open' ? 'active' : 'suspended' })) };
          });
        });
        setToast({ message: `Group ${status}`, type: status === 'open' ? 'success' : 'warning' });
        setShowGroupPopup(false);
      }, []);

      const openAll = useCallback(() => {
        setMarkets(prev => prev.map(m => {
          if (m.lines) {
            return { ...m, status: 'open', lines: m.lines.map(l => {
              if (l.status === 'settled') return l;
              return { ...l, status: 'open', selections: l.selections.map(s => ({ ...s, status: 'active' })) };
            }) };
          }
          return m.status === 'settled' ? m : { ...m, status: 'open', selections: (m.selections || []).map(s => ({ ...s, status: 'active' })) };
        }));
        setToast({ message: 'All markets opened', type: 'success' });
      }, []);

      const suspendAll = useCallback(() => {
        setMarkets(prev => prev.map(m => {
          if (m.lines) {
            return { ...m, status: 'suspended', lines: m.lines.map(l => {
              if (l.status === 'settled') return l;
              return { ...l, status: 'suspended', selections: l.selections.map(s => ({ ...s, status: 'suspended' })) };
            }) };
          }
          return m.status === 'settled' ? m : { ...m, status: 'suspended', selections: (m.selections || []).map(s => ({ ...s, status: 'suspended' })) };
        }));
        setToast({ message: 'All markets suspended', type: 'warning' });
      }, []);

      const handlePartAction = useCallback(action => {
        setToast({ message: `Action: ${action}`, type: 'info' });
      }, []);

      // Filter markets - search also matches line specifiers
      const filteredMarkets = useMemo(() => {
        let list = markets;
        if (activeTab !== 'all') list = list.filter(m => m.group === activeTab);
        if (searchQuery.trim()) {
          const q = searchQuery.toLowerCase();
          list = list.filter(m => {
            if (m.name.toLowerCase().includes(q)) return true;
            if (m.specifier && m.specifier.toLowerCase().includes(q)) return true;
            if (m.lines && m.lines.some(l => l.specifier && l.specifier.toLowerCase().includes(q))) return true;
            return false;
          });
        }
        return list;
      }, [markets, activeTab, searchQuery]);

      // 3-column layout
      const columns = useMemo(() => {
        const cols = [[], [], []];
        const heights = [0, 0, 0];

        const estimateHeight = (m) => {
          const base = 40; // header
          const mode = getMode(m.id);
          if (m.lines) {
            return base + m.lines.length * 36;
          }
          const n = (m.selections || []).length;
          if (mode === 'settle') return base + n * 32 + 30;
          const rows = n <= 3 ? 1 : Math.ceil(n / 3);
          return base + rows * 36 + 30;
        };

        const favs = filteredMarkets.filter(m => m.favorite);
        const rest = filteredMarkets.filter(m => !m.favorite);

        favs.forEach(m => {
          cols[0].push(m);
          heights[0] += estimateHeight(m);
        });

        rest.forEach(m => {
          const shortest = heights[0] <= heights[1] && heights[0] <= heights[2] ? 0
            : heights[1] <= heights[2] ? 1 : 2;
          cols[shortest].push(m);
          heights[shortest] += estimateHeight(m);
        });

        return cols;
      }, [filteredMarkets, getMode]);

      // Tab counts
      const tabCounts = useMemo(() => {
        const c = { all: markets.length };
        markets.forEach(m => { c[m.group] = (c[m.group] || 0) + 1; });
        return c;
      }, [markets]);

      const openCount = markets.filter(m => m.lines ? computeLineMarketStatus(m) === 'open' : m.status === 'open').length;
      const suspendedCount = markets.filter(m => m.lines ? computeLineMarketStatus(m) === 'suspended' : m.status === 'suspended').length;
      const settledCount = markets.filter(m => m.lines ? computeLineMarketStatus(m) === 'settled' : m.status === 'settled').length;
      const closedCount = markets.filter(m => m.lines ? computeLineMarketStatus(m) === 'closed' : m.status === 'closed').length;

      return (
        <>
          <TopBar globalMode={globalMode} onSetGlobalMode={handleSetGlobalMode} />
          <MatchHero markets={markets} matchTime={matchTime} onOpenAll={openAll} onSuspendAll={suspendAll} />
          <div className="main-layout">
            <LeftPanel parts={parts} markets={markets} onPartAction={handlePartAction} />
            <div className="center-panel">
              <div className="market-tabs">
                {Object.entries(MARKET_GROUPS).map(([key, g]) => (
                  <button key={key} className={`market-tab ${activeTab === key ? 'market-tab--active' : ''}`}
                    onClick={() => setActiveTab(key)}>
                    {g.name}
                    <span className="market-tab__count">{tabCounts[key] || 0}</span>
                  </button>
                ))}
                <div className="market-tabs__spacer"></div>
                <div className="market-search">
                  <span className="market-search__icon">{'\uD83D\uDD0D'}</span>
                  <input ref={searchRef} className="market-search__input" placeholder="Search..."
                    value={searchQuery} onChange={e => setSearchQuery(e.target.value)} />
                </div>
                <div className="market-tabs__summary">
                  <span><span className="market-tabs__summary-dot" style={{background:'var(--green)'}}></span>{openCount}</span>
                  <span><span className="market-tabs__summary-dot" style={{background:'var(--orange)'}}></span>{suspendedCount}</span>
                  <span><span className="market-tabs__summary-dot" style={{background:'var(--settled)'}}></span>{settledCount}</span>
                  <span><span className="market-tabs__summary-dot" style={{background:'var(--red)'}}></span>{closedCount}</span>
                </div>
              </div>
              <div className="market-grid-container">
                {filteredMarkets.length === 0 ? (
                  <div style={{textAlign:'center',padding:40,color:'var(--text-muted)'}}>No markets found</div>
                ) : (
                  <div className="market-grid">
                    {columns.map((col, ci) => (
                      <div className="market-column" key={ci}>
                        {col.map(m => (
                          <MarketCard
                            key={m.id}
                            market={m}
                            mode={getMode(m.id)}
                            onSetMode={setMarketMode}
                            onToggleFavorite={toggleFavorite}
                            onSetStatus={setMarketStatus}
                            onToggleSelection={toggleSelection}
                            onShowHistory={id => setModal({ type: 'history', marketId: id })}
                            onShowOddsHistory={id => setModal({ type: 'odds', marketId: id })}
                            onStartSettle={startSettle}
                            onStopSettle={stopSettle}
                            onStartCancel={startCancelFlow}
                            onStopCancel={stopCancel}
                            onRollback={rollback}
                            settlingInfo={settlingMap[m.id] || null}
                            cancellingInfo={cancellingMap[m.id] || null}
                            lineSettlingMap={lineSettlingMap}
                            lineCancellingMap={lineCancellingMap}
                            onStartLineSettle={startLineSettle}
                            onStopLineSettle={stopLineSettle}
                            onStartLineCancel={startLineCancelFlow}
                            onStopLineCancel={stopLineCancel}
                            onRollbackLine={rollbackLine}
                          />
                        ))}
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          </div>

          {showGroupPopup && <GroupModal markets={markets} onGroupAction={handleGroupAction} onClose={() => setShowGroupPopup(false)} />}

          {modal?.type === 'history' && (
            <StatusHistoryModal market={markets.find(m => m.id === modal.marketId)} history={statusHistory[modal.marketId]} onClose={() => setModal(null)} />
          )}
          {modal?.type === 'odds' && (
            <OddsHistoryModal market={markets.find(m => m.id === modal.marketId)} oddsHistory={oddsHistory} onClose={() => setModal(null)} />
          )}
          {modal?.type === 'cancel' && (
            <CancelModal
              market={markets.find(m => m.id === modal.marketId)}
              lineId={modal.lineId || null}
              onConfirm={confirmCancel}
              onConfirmLine={confirmLineCancel}
              onClose={() => setModal(null)} />
          )}

          {toast && <Toast message={toast.message} type={toast.type} onDone={() => setToast(null)} />}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
